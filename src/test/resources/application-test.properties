# Test-only profile. Boots the full Spring context against an in-memory H2
# database (MySQL compatibility mode) so @SpringBootTest can run in CI / on a
# clean machine without MySQL, DB_URL/DB_USERNAME/DB_PASSWORD, or a real schema.
spring.datasource.url=jdbc:h2:mem:football_league_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate builds the schema from the entities for the test run, then drops it.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Destructive demo seeding stays off; this profile is not "dev".
app.seed.reset-data=false
app.seed.create-dev-admin=false
