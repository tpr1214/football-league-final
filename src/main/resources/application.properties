
spring.datasource.url=jdbc:mysql://localhost:3306/football_league?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000


server.port=8080
spring.application.name=football-league

# File upload (profile images). Container limit is higher than the 5MB business
# rule so the service can return a clean Hebrew error message itself.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Where uploaded files are stored on disk and the public base URL used to build
# absolute image links saved in the database.
app.upload.dir=uploads
app.base-url=http://localhost:8080

# Production-safe default: do not reset/seed data unless explicitly enabled in
# the dev profile.
app.seed.reset-data=false
app.seed.create-dev-admin=false
