
# Production configuration must be supplied by the runtime environment.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:30000}


server.port=${SERVER_PORT:8080}
spring.application.name=football-league

# Allowed frontend origins for CORS (comma-separated). Supplied by the runtime
# environment in production; falls back to the local Vite dev ports.
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# File upload (profile images). Container limit is higher than the 5MB business
# rule so the service can return a clean Hebrew error message itself.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Where uploaded files are stored on disk and the public base URL used to build
# absolute image links saved in the database.
app.upload.dir=${UPLOAD_DIR:uploads}
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Production-safe default: do not reset/seed data unless explicitly enabled in
# the dev profile.
app.seed.reset-data=false
app.seed.create-dev-admin=false
