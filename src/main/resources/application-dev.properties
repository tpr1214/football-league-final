# Local development opt-in for resetting demo league data on startup.
# DataInitializer still requires the active Spring profile to be "dev".
spring.datasource.url=jdbc:mysql://localhost:3306/football_league?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.upload.dir=uploads
app.base-url=http://localhost:8080

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

app.seed.reset-data=true
app.seed.create-dev-admin=true
